name: Feature request
description: Suggest a new entity, service, or behavior
labels: [enhancement]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
      description: Describe the feature and the use case it unlocks.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
