name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run pytest with coverage floor
        # --cov-fail-under matches the local coverage we established
        # (see TODO.md: Silver test-coverage-above-95%). Drop this
        # floor deliberately if a refactor genuinely reduces the
        # useful surface, not to make a red build green.
        run: |
          python -m pytest tests/ \
            --cov=custom_components/lydbro \
            --cov-report=term-missing \
            --cov-fail-under=95
      - name: mypy strict
        # Platinum strict-typing — see TODO.md. Keep strict=True on;
        # don't soften the config to make a red build green.
        run: python -m mypy

  # HACS validation is intentionally disabled while this repo is
  # private — the hacs/action image can't resolve private repos
  # reliably, and we're not ready to publish to the HACS index yet.
  # When the repo goes public AND we want a HACS listing, uncomment:
  #
  # hacs:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: hacs/action@main
  #       with:
  #         category: integration
