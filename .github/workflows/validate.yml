name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run pytest with coverage floor
        # Full-tree coverage is the goal: genuinely defensive dead
        # code is marked `# pragma: no cover` in-source, everything
        # else is exercised by a test. Drop this floor deliberately
        # if a refactor changes the surface, not to make a red build
        # green.
        run: |
          python -m pytest tests/ \
            --cov=custom_components/lydbro \
            --cov-report=term-missing \
            --cov-fail-under=100
      - name: mypy strict
        # Platinum strict-typing — see TODO.md. Keep strict=True on;
        # don't soften the config to make a red build green.
        run: python -m mypy

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Not (yet) in the HACS default store — installed as a custom
          # repository, so skip the brands check until we submit there.
          ignore: brands
