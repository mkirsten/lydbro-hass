send_remote_key:
  name: Send remote key
  description: Inject a virtual BeoRemote One key press on the bridge's bus. Automations can use this to fire the same flow as a real button press.
  fields:
    device_id:
      name: Device
      required: true
      selector:
        device:
          integration: lydbro
    key:
      name: Key
      required: true
      example: "Play"
      selector:
        text:
